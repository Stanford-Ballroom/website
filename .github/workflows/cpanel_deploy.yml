name: Deploy Hugo Site via SSH rsync

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.150.0'
          extended: true

      - name: Build site
        run: hugo --minify --baseURL="https://ballroom.stanford.edu"

      - name: Upload public dir
        uses: actions/upload-artifact@v4
        with:
          name: public_dir
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download public dir
        uses: actions/download-artifact@v5
        with:
          name: public_dir
      - name: Rsync Deployments Action
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -avzh
          path: ./public/
          remote_path: /home/rohitnem/ballroom.stanford.edu/
          remote_host: "${{ secrets.STANFORD_DOMAINS_SSH_HOST }}"  
          remote_user: "${{ secrets.STANFORD_DOMAINS_SSH_USERNAME }}"
          remote_key: "${{ secrets.STANFORD_DOMAINS_SSH_PRIV_KEY }}"
          remote_key_pass: "${{ secrets.STANFORD_DOMAINS_SSH_PRIV_KEY_PASSPHRASE }}"
          debug: true
